name: backend-ci

on:
  push:
  pull_request:

jobs:
  unit-and-schema:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend package (pinned google-adk==2.4.0 via pyproject)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Fast pytest (exclude LLM-marked tests)
        # No OPENAI_API_KEY — keeps this job LLM-free.
        # Covers: test_demo_tools, test_progressive_skills, test_skill_frontmatter,
        # and any other non-llm tests. Excludes test_evals / test_offtopic via -m.
        run: python -m pytest -m "not llm" -v
