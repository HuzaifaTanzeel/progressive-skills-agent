name: backend-ci

# Fast, LLM-free unit/schema checks.
#
# Cost / noise controls:
# - pull_request only (not push to main) so merge does not re-run after PR CI.
# - Path-filtered: skips docs/README/frontend-only changes.
# - workflow_dispatch for a manual check on main if needed.

on:
  pull_request:
    paths:
      - "backend/**"
      - "skills/**"
      - "evals/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-schema:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend package (pinned google-adk[db,eval]==2.4.0 via pyproject)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Fast pytest (exclude LLM-marked tests)
        # No OPENAI_API_KEY — keeps this job LLM-free.
        # Covers: test_demo_tools, test_progressive_skills, test_skill_frontmatter,
        # and any other non-llm tests. Excludes test_evals / test_offtopic via -m.
        # Ignore LLM modules so collection does not import LocalEvalService/vertexai.
        run: python -m pytest -m "not llm" --ignore=tests/test_evals.py --ignore=tests/test_offtopic.py -v
